name: Deploy Plants Shop

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /var/www/plants-shop
          git pull origin main

       

      - name: Build and restart containers
        run: |
          cd /var/www/plants-shop
          docker compose up -d --build

      - name: Clean up old images
        run: docker image prune -f